name: "BT HCI Proxy"
version: "1.0.0"
slug: "bt-hci-proxy"
description: "Attaches a Bluetooth HCI UART device (btattach) for use with the bt-proxy host-side service"
url: "https://github.com/fifthvertex/bt-proxy"
arch:
  - amd64
  - aarch64
startup: system
boot: auto
init: false
devices:
  - /dev/ttyS1
privileged:
  - SYS_MODULE
  - NET_ADMIN
options:
  device: "/dev/ttyS1"
  protocol: "h4"
  passive_scan: true
schema:
  device: str
  protocol: str
  passive_scan: bool
